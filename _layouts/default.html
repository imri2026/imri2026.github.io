<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <script>
      document.addEventListener("click", function(e) {
        var link = e.target.closest("a[href]");
        if (!link) return;
        var href = link.getAttribute("href");
        if (!href || href.startsWith("#") || href.startsWith("mailto:")) return;
        var isExternal = /^https?:\/\//i.test(href) && !href.includes(location.hostname);
        if (isExternal) {
          e.preventDefault();
          var confirmed = confirm("You are about to leave the 15th Interventional MRI Symposium website and enter a third-party website. Do you wish to continue?");
          if (confirmed) window.open(href, link.target || "_self");
        }
      });
    </script>

  </body>

</html>
